<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>M2 CRM</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white">
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            const [aba, setAba] = React.useState("inicio");
            return (
                <div className="flex h-screen">
                    <div className="w-64 bg-slate-800 p-5 border-r border-slate-700">
                        <h1 className="text-xl font-bold text-indigo-400 mb-10">M2 CRM</h1>
                        <button onClick={() => setAba("inicio")} className="block w-full text-left p-3 hover:bg-slate-700 rounded">Dashboard</button>
                        <button onClick={() => setAba("clientes")} className="block w-full text-left p-3 hover:bg-slate-700 rounded">Clientes</button>
                    </div>
                    <div className="flex-1 p-10">
                        {aba === "inicio" ? (
                            <div>
                                <h2 className="text-3xl font-bold">Dashboard Ativo!</h2>
                                <p className="mt-4 text-slate-400">Se você está vendo isso, vencemos a batalha.</p>
                            </div>
                        ) : (
                            <h2 className="text-3xl font-bold">Área de Clientes</h2>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Visitas - M2</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #0F172A; color: white; margin: 0; }
        .sidebar-btn:hover { background: rgba(99, 102, 241, 0.15); }
        .active-btn { background: #4F46E5 !important; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState("dashboard");
            const [clients, setClients] = useState(() => JSON.parse(localStorage.getItem("crm_clients_m2") || "[]"));
            const [visits, setVisits] = useState(() => JSON.parse(localStorage.getItem("crm_visits_m2") || "[]"));

            useEffect(() => { localStorage.setItem("crm_clients_m2", JSON.stringify(clients)); }, [clients]);
            useEffect(() => { localStorage.setItem("crm_visits_m2", JSON.stringify(visits)); }, [visits]);

            const renderContent = () => {
                if (view === "dashboard") {
                    return (
                        <div className="animate-in fade-in duration-500">
                            <h2 className="text-3xl font-bold font-['Space_Grotesk'] mb-2 text-indigo-400">Dashboard M2</h2>
                            <p className="text-slate-400 mb-8">Gestão comercial de visitas</p>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-[#1E293B] p-6 rounded-2xl border border-slate-700">
                                    <p className="text-slate-400 text-sm">Total de Clientes</p>
                                    <p className="text-4xl font-bold mt-2">{clients.length}</p>
                                </div>
                                <div className="bg-[#1E293B] p-6 rounded-2xl border border-slate-700">
                                    <p className="text-slate-400 text-sm">Visitas Registradas</p>
                                    <p className="text-4xl font-bold mt-2 text-indigo-400">{visits.length}</p>
                                </div>
                            </div>
                        </div>
                    );
                }
                if (view === "clientes") {
                    return (
                        <div>
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-2xl font-bold font-['Space_Grotesk']">Meus Clientes</h2>
                                <button onClick={() => {
                                    const name = prompt("Nome da Empresa:");
                                    if(name) setClients([...clients, {id: Date.now(), name, city: prompt("Cidade:"), phone: prompt("Telefone:")}]);
                                }} className="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg font-bold">+ Novo Cliente</button>
                            </div>
                            <div className="bg-[#1E293B] rounded-xl border border-slate-700 overflow-hidden text-sm">
                                {clients.length === 0 ? <p className="p-8 text-center text-slate-500">Nenhum cliente cadastrado.</p> : 
                                 clients.map(c => (
                                    <div key={c.id} className="p-4 border-b border-slate-700 flex justify-between items-center hover:bg-slate-800">
                                        <div><p className="font-bold">{c.name}</p><p className="text-slate-400 text-xs">{c.city} - {c.phone}</p></div>
                                        <button onClick={() => setClients(clients.filter(x => x.id !== c.id))} className="text-red-400 text-xs">Excluir</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }
                return <div className="text-slate-500 text-center mt-20 text-xl font-bold">M2 Representações - Em breve!</div>;
            };

            return (
                <div className="flex min-h-screen">
                    <aside className="w-64 bg-[#1E293B] border-r border-slate-700 p-6 flex flex-col gap-8">
                        <h1 className="text-indigo-400 font-bold text-2xl font-['Space_Grotesk']">M2 CRM</h1>
                        <nav className="flex flex-col gap-2">
                            <button onClick={() => setView("dashboard")} className={`text-left p-3 rounded-xl sidebar-btn ${view === 'dashboard' ? 'active-btn' : ''}`}>⬡ Dashboard</button>
                            <button onClick={() => setView("clientes")} className={`text-left p-3 rounded-xl sidebar-btn ${view === 'clientes' ? 'active-btn' : ''}`}>👥 Clientes</button>
                            <button onClick={() => setView("visitas")} className={`text-left p-3 rounded-xl sidebar-btn ${view === 'visitas' ? 'active-btn' : ''}`}>📅 Visitas</button>
                        </nav>
                    </aside>
                    <main className="flex-1 p-10 bg-[#0F172A]">{renderContent()}</main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
